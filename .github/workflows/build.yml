name: Build and deploy to Nekoweb

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install m4
        run: sudo apt-get update && sudo apt-get install -y m4
      - name: Build site with Make
        run: make

      - name: Deploy to NekoWeb
        uses: indiefellas/deploy2nekoweb@main
        with:
          nekoweb-api-key: ${{ secrets.NEKOWEB_API_KEY }}
          nekoweb-domain: 'dontwalkaway.nekoweb.org'
          nekoweb-username: 'dontwalkaway'
          
          directory: 'public'
